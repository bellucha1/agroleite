<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AGROLEITE - Agendamentos</title>

<link rel="stylesheet" href="estilo.css">

</head>

<body>

<nav>
    <a href="home.html">Home</a>
    <a href="clientes.html">Clientes</a>
    <a href="servicos.html">Serviços</a>
    <a href="agendamentos.html">Agendamentos</a>
    <a href="consulta_agendamentos.html">Consulta Agendamentos</a>
</nav>

<header class="banner">
    <h1>Controle de Agendamentos</h1>
    <p>Cadastre atendimentos para os clientes</p>
</header>

<div class="container">

<div class="card">

<h2>Novo Agendamento</h2>

<label>Cliente</label>

<select id="cliente">

    <option>João Victor</option>
    <option>Isabella Juliana</option>
    <option>Pedro Emanuel</option>
    <option>Roselaine Clei</option>

</select>

<br><br>

<label>Data</label>

<input type="date" id="data">

<br><br>

<label>Hora</label>

<input type="time" id="hora">

<hr>

<h2>Adicionar Serviço</h2>

<label>Serviço</label>

<select id="servico" onchange="selecionarServico()">

<option value="">Selecione...</option>

<option value="0">
Análise da Qualidade do Leite
</option>

<option value="1">
Coleta de Amostras
</option>

<option value="2">
Visita Técnica
</option>

<option value="3">
Consultoria em Nutrição Animal
</option>

<option value="4">
Diagnóstico da Propriedade
</option>

<option value="5">
Treinamento de Ordenha
</option>

<option value="6">
Avaliação Sanitária do Rebanho
</option>

<option value="7">
Planejamento Alimentar
</option>

</select>

<br><br>

<label>Valor (R$)</label>

<input
type="text"
id="valor"
readonly>

<br><br>

<label>Tempo Estimado</label>

<input
type="text"
id="tempo"
readonly>

<br><br>

<button onclick="adicionarServico()">

Adicionar Serviço

</button>

</div>

<div class="card">

<h2>Serviços do Agendamento</h2>

<table>

<thead>

<tr>

<th>Serviço</th>

<th>Valor</th>

<th>Tempo</th>

</tr>

</thead>

<tbody id="lista">

</tbody>

</table>

<br>

<h3 id="total">

Total: R$ 0,00

</h3>

<h3 id="tempoTotal">

Tempo Total: 0 horas

</h3>

<br>

<button onclick="salvarAgendamento()">

Salvar Agendamento

</button>

</div>

</div><script>

const catalogo = [

    {
        nome:"Análise da Qualidade do Leite",
        preco:120,
        tempo:2
    },

    {
        nome:"Coleta de Amostras",
        preco:80,
        tempo:1
    },

    {
        nome:"Visita Técnica",
        preco:250,
        tempo:4
    },

    {
        nome:"Consultoria em Nutrição Animal",
        preco:350,
        tempo:5
    },

    {
        nome:"Diagnóstico da Propriedade",
        preco:450,
        tempo:6
    },

    {
        nome:"Treinamento de Ordenha",
        preco:300,
        tempo:3
    },

    {
        nome:"Avaliação Sanitária do Rebanho",
        preco:180,
        tempo:2
    },

    {
        nome:"Planejamento Alimentar",
        preco:280,
        tempo:3
    }

];

let carrinho = [];

function selecionarServico(){

    const indice = document.getElementById("servico").value;

    if(indice===""){
        document.getElementById("valor").value="";
        document.getElementById("tempo").value="";
        return;
    }

    document.getElementById("valor").value =
        "R$ " + catalogo[indice].preco.toFixed(2);

    document.getElementById("tempo").value =
        catalogo[indice].tempo + " hora(s)";
}

function adicionarServico(){

    const indice=document.getElementById("servico").value;

    if(indice===""){
        alert("Selecione um serviço.");
        return;
    }

    carrinho.push(catalogo[indice]);

    atualizarTabela();

}

function atualizarTabela(){

    let tbody=document.getElementById("lista");

    tbody.innerHTML="";

    let total=0;

    let horas=0;

    carrinho.forEach(servico=>{

        total+=servico.preco;

        horas+=servico.tempo;

        tbody.innerHTML+=`

        <tr>

            <td>${servico.nome}</td>

            <td>R$ ${servico.preco.toFixed(2)}</td>

            <td>${servico.tempo} h</td>

        </tr>

        `;

    });

    document.getElementById("total").innerHTML=
    "Total: R$ "+total.toFixed(2);

    document.getElementById("tempoTotal").innerHTML=
    "Tempo Total: "+horas+" hora(s)";

}

function salvarAgendamento(){

    const cliente=document.getElementById("cliente").value;

    const data=document.getElementById("data").value;

    const hora=document.getElementById("hora").value;

    if(cliente==="" || data==="" || hora===""){

        alert("Preencha todos os campos.");

        return;

    }

    if(carrinho.length===0){

        alert("Adicione pelo menos um serviço.");

        return;

    }

    const agendamento={

        cliente:cliente,

        data:data,

        hora:hora,

        servicos:carrinho

    };

    let lista=
        JSON.parse(localStorage.getItem("agendamentos")) || [];

    lista.push(agendamento);

    localStorage.setItem(
        "agendamentos",
        JSON.stringify(lista)
    );

    alert("Agendamento salvo com sucesso!");

    location.reload();

}

</script>

</body>
</html>
