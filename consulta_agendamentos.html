```html
<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AGROLEITE - Consulta de Agendamentos</title>

<link rel="stylesheet" href="estilo.css">

</head>

<body>

<nav>

<a href="home.html">Home</a>

<a href="clientes.html">Clientes</a>

<a href="servicos.html">Serviços</a>

<a href="agendamentos.html">Agendamentos</a>

<a href="consulta_agendamentos.html">Consulta Agendamentos</a>

</nav>

<header class="banner">

<h1>Histórico de Agendamentos</h1>

<p>Consulte todos os atendimentos cadastrados.</p>

</header>

<div class="container">

<div class="card">

<h2>Pesquisar</h2>

<input
type="text"
id="pesquisa"
placeholder="Digite o nome do cliente..."
onkeyup="listarAgendamentos()">

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Cliente</th>

<th>Data</th>

<th>Hora</th>

<th>Serviços</th>

<th>Total</th>

<th>Tempo</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="tabela">

</tbody>

</table>

</div>

</div>

<script>

function listarAgendamentos(){

    const tabela=document.getElementById("tabela");

    tabela.innerHTML="";

    const pesquisa=
        document.getElementById("pesquisa").value.toLowerCase();

    let lista=
        JSON.parse(localStorage.getItem("agendamentos")) || [];

    lista.forEach((agendamento,indice)=>{

        if(!agendamento.cliente.toLowerCase().includes(pesquisa))
            return;

        let nomes=[];

        let total=0;

        let tempo=0;

        agendamento.servicos.forEach(servico=>{

            nomes.push(servico.nome);

            total+=servico.preco;

            tempo+=servico.tempo;

        });

        tabela.innerHTML+=`

        <tr>

        <td>${agendamento.cliente}</td>

        <td>${agendamento.data}</td>

        <td>${agendamento.hora}</td>

        <td>${nomes.join("<br>")}</td>

        <td>R$ ${total.toFixed(2)}</td>

        <td>${tempo} h</td>

        <td>

        <button onclick="excluir(${indice})">

        Excluir

        </button>

        </td>

        </tr>

        `;

    });

}

function excluir(indice){

    if(!confirm("Deseja excluir este agendamento?"))
        return;

    let lista=
        JSON.parse(localStorage.getItem("agendamentos")) || [];

    lista.splice(indice,1);

    localStorage.setItem(
        "agendamentos",
        JSON.stringify(lista)
    );

    listarAgendamentos();

}

listarAgendamentos();

</script>

</body>

</html>
```
